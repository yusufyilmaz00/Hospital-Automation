<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hastane Kontrol Paneli</title>
    <style>
        body
        {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            background-color: #f0f2f5;
        }
        .sidebar
        {
            width: 250px;
            background-color: #1a252f;
            color: #ffffff;
            height: 100vh;
            padding: 20px 0;
        }
        .sidebar h2
        {
            text-align: center;
            margin-bottom: 30px;
        }
        .sidebar ul
        {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .sidebar ul li
        {
            padding: 15px 20px;
            border-bottom: 1px solid #2c3e50;
            cursor: pointer;
        }
        .sidebar ul li:hover
        {
            background-color: #2c3e50;
        }
        .content
        {
            flex: 1;
            padding: 30px;
        }
        .header
        {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .dashboard-cards
        {
            display: flex;
            gap: 20px;
        }
        .card
        {
            background-color: #ffffff;
            flex: 1;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            text-align: center;
        }
        .card h3
        {
            color: #7f8c8d;
            margin-top: 0;
        }
        .card .value
        {
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
            margin: 10px 0 0 0;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Hastane Paneli</h2>
        <ul>
            <li>Ana Sayfa</li>
            <li>Hasta Kayıtları</li>
            <li>Doktor Listesi</li>
            <li>Randevular</li>
            <li>Finans & Fatura</li>
            <li>Ayarlar</li>
        </ul>
    </div>

    <div class="content">
        <div class="header">
            <h1>Hoş Geldiniz</h1>
        </div>
        
        <div class="dashboard-cards">
            <div class="card">
                <h3>Toplam Hasta</h3>
                <p class="value">1,245</p>
            </div>
            <div class="card">
                <h3>Aktif Randevular</h3>
                <p class="value">128</p>
            </div>
            <div class="card">
                <h3>Görevli Doktorlar</h3>
                <p class="value">42</p>
            </div>
            <div class="card">
                <h3>Boş Yatak Sayısı</h3>
                <p class="value">15</p>
            </div>
        </div>
    </div>

</body>
</html>
